name: 🐛 バグ報告
description: バグや予期しない動作を報告する
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        バグ報告ありがとうございます！以下の項目を記入してください。

  - type: textarea
    id: description
    attributes:
      label: バグの説明
      description: 何が問題かを明確・簡潔に説明してください
      placeholder: |
        `fdk load accounting/quickstart` を実行すると、エラーが発生します...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: 再現手順
      description: バグを再現する手順
      placeholder: |
        1. `fdk auth` でログイン
        2. `fdk load accounting/quickstart` を実行
        3. エラーメッセージを確認
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期待する動作
      description: 本来どのような動作を期待していましたか
      placeholder: データが正常に投入される
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 実際の動作
      description: 実際に何が起きましたか（エラーメッセージがあれば含めてください）
      placeholder: |
        Error: Authentication failed...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: freee-demo-kit バージョン
      description: "`fdk --version` または `npm list freee-demo-kit` で確認"
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node.js バージョン
      description: "`node --version` で確認"
      placeholder: "v20.10.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      description: "例: macOS 14.2、Ubuntu 22.04、Windows 11"
      placeholder: "macOS 14.2"
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: 補足情報
      description: その他の情報、スクリーンショット、ログなど
    validations:
      required: false
