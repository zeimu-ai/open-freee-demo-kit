name: ❓ 質問・相談
description: 使い方や動作について質問する
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        ご質問をお待ちしています！お気軽にどうぞ。

  - type: textarea
    id: question
    attributes:
      label: 質問内容
      description: freee-demo-kit について知りたいことを記入してください
      placeholder: |
        `fdk load` の実行後に追加でデータを投入したい場合はどうすればいいですか？
        認証情報はどこに保存されますか？
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: 補足情報
      description: 試したこと、参照したドキュメントなど
      placeholder: |
        READMEを確認しましたが...
        `fdk auth` は実行済みですが...
    validations:
      required: false
